<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KTM Fleet Command Center</title>

<style>
body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#f4f6f9;
}

header{
    background:#c8102e;
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    padding:20px;
}

.cards{
    display:flex;
    gap:20px;
    flex-wrap:wrap;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
    min-width:220px;
}

.number{
    font-size:32px;
    font-weight:bold;
    color:#c8102e;
}

table{
    width:100%;
    border-collapse:collapse;
    background:white;
    margin-top:20px;
}

th,td{
    border:1px solid #ddd;
    padding:10px;
}

th{
    background:#c8102e;
    color:white;
}

.search{
    margin-top:20px;
    padding:10px;
    width:300px;
}
</style>
</head>

<body>

<header>
<h1>KTM Fleet Command Center</h1>
<p>ระบบบริหารจัดการยานพาหนะ บริษัท เค.ที.เอ็ม. สตีล จำกัด</p>
</header>

<div class="container">

<div class="cards">

<div class="card">
<h3>รถทั้งหมด</h3>
<div class="number">51</div>
</div>

<div class="card">
<h3>รถพร้อมใช้งาน</h3>
<div class="number">51</div>
</div>

<div class="card">
<h3>รถซ่อมอยู่</h3>
<div class="number">0</div>
</div>

</div>

<input id="searchBox" class="search" placeholder="ค้นหาทะเบียนรถ">   
<table>
<thead>
<tr>
<th>ทะเบียน</th>
<th>จังหวัด</th>
<th>สถานะ</th>
</tr>
</thead>

<tbody id="vehicleTable">
<tr>
<td>88-9275</td>
<td>นครราชสีมา</td>
<td>พร้อมใช้งาน</td>
</tr>

<tr>
<td>88-9279</td>
<td>นครราชสีมา</td>
<td>พร้อมใช้งาน</td>
</tr>

<tr>
<td>89-4864</td>
<td>นครราชสีมา</td>
<td>พร้อมใช้งาน</td>
</tr>

</tbody>
</table>

</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const SUPABASE_URL =
'https://oczwqlwsqqaprsasxmnq.supabase.co';

const SUPABASE_KEY =
'sb_publishable_2SRy0z_koXAfEZkHRCeMGw_2UaqKfpp';

const supabaseClient =
supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const tableBody =
document.getElementById('vehicleTable');

const searchBox =
document.getElementById('searchBox');

async function loadVehicles() {

    const { data, error } = await supabaseClient
        .from('vehicles')
        .select('*')
        .order('RegNo');

    if (error) {
        console.error(error);
        return;
    }

    tableBody.innerHTML = '';

    data.forEach(vehicle => {

        const row = document.createElement('tr');

        row.innerHTML = `
            <td>${vehicle.RegNo || ''}</td>
            <td>${vehicle.RegProvince || ''}</td>
            <td>พร้อมใช้งาน</td>
        `;

        tableBody.appendChild(row);

    });

    document.querySelectorAll('.number')[0].innerText = data.length;
    document.querySelectorAll('.number')[1].innerText = data.length;

    enableSearch();

}

function enableSearch() {

    searchBox.addEventListener('keyup', function() {

        const keyword = this.value.toLowerCase();

        const rows =
        document.querySelectorAll('#vehicleTable tr');

        rows.forEach(row => {

            const reg =
            row.cells[0].innerText.toLowerCase();

            row.style.display =
            reg.includes(keyword)
            ? ''
            : 'none';

        });

    });

}

loadVehicles();

</script>
</body>
</html>
